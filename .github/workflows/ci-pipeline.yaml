name: CI Pipeline

on:
  push:
    branches:
      - 'master'
    tags:
      - '*'
  pull_request:

jobs:
  build_binaries:
    name: Build Binaries
    runs-on: ubuntu-24.04

    steps:
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.24.4

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build
        run: |
          export PATH="$GOBIN:$PATH"
          . build.sh
        env:
          ARTIFACTS: ${{ runner.temp }}/artifacts
        shell: bash

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: ${{ runner.temp }}/artifacts/binaries

  linux:
    name: Linux
    runs-on: ubuntu-24.04
    needs: build_binaries

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: artifacts/binaries

      - name: Run Docker Tests
        run: . run-docker-tests-linux.sh
        shell: bash

      - name: Build Docker Images
        run: ./build-images-linux.sh
        env:
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        shell: bash

  windows:
    name: Windows
    runs-on: windows-2022
    needs: build_binaries

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: artifacts/binaries

      # Uncomment this step if needed once windows docker tests are implemented
      # - name: Run Docker Tests (Windows)
      #   run: .\run-docker-tests-windows.sh
      #   shell: bash

      - name: Build Docker Images
        run: ./build-images-windows.sh
        env:
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        shell: bash

  ghcr:
    name: Publish to GHCR
    runs-on: ubuntu-24.04
    needs: build_binaries
    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/caddy-docker-proxy

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: artifacts/binaries

      - name: Make binaries executable
        run: find artifacts/binaries -type f -exec chmod +x {} \;
        shell: bash

      - name: Prepare HostView template
        run: |
          mkdir -p artifacts/hostview
          cp hostview/hostview.html artifacts/hostview/hostview.html
        shell: bash

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="latest"
          fi
          echo "TAG=${TAG}" >> $GITHUB_ENV
        shell: bash

      - name: Build and push image to GHCR
        run: |
          docker buildx build \
            -f Dockerfile-ci \
            --platform linux/amd64 \
            -t ${REGISTRY}/${IMAGE_NAME}:${TAG} \
            --push \
            .
        shell: bash
